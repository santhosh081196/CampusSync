name: Build application

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            command: npm run dist:win
          - os: macos-latest
            command: npm run dist:mac:universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: calendar-canvas-${{ matrix.os }}
          path: dist/*
